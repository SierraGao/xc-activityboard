<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/xc-activityboard/css/style.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1 class="site-title">抖B社群活动公告栏</h1>
    </header>

    <main>

      <div class="detail-section">
        <div class="detail-title">周五周末券（26.6.19） <span class="status-tag upcoming-tag" data-start="2026-06-19T18:00" data-end="2026-06-19T18:01" data-prize-start="" data-prize-end="" data-longterm="0" style="margin-left:8px;vertical-align:middle;">待开始</span></div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">活动时间</div>
          <div class="detail-content">2026.06.19 18:00 - 2026.06.19 18:01</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">活动规则</div>
          <div class="detail-content"><div>大佬们好～本周在微信群、qq群、抖音群分别发放周末券！<span style="font-size: 0.95rem;">数量有限，先到先得！</span></div><div>微信群：199-20券</div><div>QQ 群：199-20券</div></div>
        </div>
      </div>
      <a href="/xc-activityboard/" class="back-link">← 返回首页</a>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 抖B社群活动公告栏</p>
    </footer>
  </div>

  <div id="lightbox" class="lightbox-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
    <button class="lightbox-close" onclick="document.getElementById('lightbox').style.display='none'">&times;</button>
    <img id="lightboxImg" src="" alt="查看原图">
    <div class="lightbox-hint">长按或右键可保存图片</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.addEventListener('click', function(e) {
        var t = e.target;
        if (t.tagName === 'IMG') {
          var p = t.parentElement, ok = false;
          while (p) { if (p.classList && p.classList.contains('detail-content')) { ok = true; break; } p = p.parentElement; }
          if (ok) { e.preventDefault(); document.getElementById('lightboxImg').src = t.src; document.getElementById('lightbox').style.display = 'flex'; }
        }
      });
    });
  </script>
  <script src="/xc-activityboard/js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积分体系 - 抖B社群活动公告栏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1 class="site-title">抖B社群活动公告栏</h1>
    </header>

    <main>

      <div class="detail-section">
        <div class="detail-title">积分体系 <span class="status-tag active-tag" style="margin-left:8px;vertical-align:middle;">进行中</span></div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">活动时间</div>
          <div class="detail-content">2026.01.01 - 长期</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">活动规则</div>
          <div class="detail-content" style="white-space:pre-line;">1. 每日签到可获得10积分
2. 下单1元=1积分
3. 积分可兑换优惠券和实物奖品</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">活动入口</div>
          <div class="detail-content"><p>在抖B APP中点击「我的-积分中心」进入</p></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">兑奖方式</div>
          <div class="detail-content" style="white-space:pre-line;">积分商城自行兑换</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-item">
          <div class="detail-label">活动奖品</div>
          <div class="detail-content" style="white-space:pre-line;">100积分：5元无门槛券
500积分：30元优惠券
1000积分：精美周边礼品</div>
        </div>
      </div>
      <a href="../" class="back-link">← 返回首页</a>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 抖B社群活动公告栏</p>
    </footer>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
